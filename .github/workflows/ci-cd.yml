name: CI/CD Pipeline

# Trigger on push or PR to main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Lint and Test ──────────────────────────────────────
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: books-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: books-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: books-api/coverage/
          retention-days: 7

  # ── Job 2: Build and Push Docker Image ───────────────────────
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./books-api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/books-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/books-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
# Workflow Trigger
